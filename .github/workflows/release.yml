name: Release

on:
    push:
        tags: ["v*"]
    workflow_dispatch:

jobs:
    build:
        name: Build (${{ matrix.target }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      use_cross: false
                      ext: .exe
                    - target: aarch64-pc-windows-msvc
                      os: windows-latest
                      use_cross: false
                      ext: .exe
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      use_cross: false
                      ext: ""
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      use_cross: true
                      ext: ""
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      use_cross: false
                      ext: ""
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      use_cross: false
                      ext: ""

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install cross
              if: ${{ matrix.use_cross }}
              run: cargo install cross --locked

            - name: Build (native)
              if: ${{ !matrix.use_cross }}
              run: cargo build --release -p ourboros --features app --target ${{ matrix.target }}

            - name: Build (cross)
              if: ${{ matrix.use_cross }}
              run: cross build --release -p ourboros --features app --target ${{ matrix.target }}

            - name: Prepare artifact
              shell: bash
              run: |
                  BIN="ourboros${{ matrix.ext }}"
                  cp "target/${{ matrix.target }}/release/$BIN" "$BIN"
                  tar -czf "ourboros-${{ matrix.target }}.tar.gz" "$BIN"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ourboros-${{ matrix.target }}
                  path: ourboros-${{ matrix.target }}.tar.gz

    create-release:
        name: Create Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v4
              with:
                  pattern: ourboros-*
                  merge-multiple: true

            - name: Generate checksums
              run: sha256sum *.tar.gz > checksums.txt

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      *.tar.gz
                      checksums.txt
                  generate_release_notes: true
