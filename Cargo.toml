[workspace]
resolver = "2"
members = [
    "crates/ourboros-core",
    "crates/ourboros-server",
    "crates/ourboros-tauri",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["gsxhnd"]
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
